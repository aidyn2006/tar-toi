server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    client_max_body_size 100M;

    # Internal app and invite routes are CSR-only and should not be indexed.
    location ~ ^/dashboard/?$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /app-shell.html =404;
    }

    location = /invite/new {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /app-shell.html =404;
    }

    location ~ ^/invite/edit/[^/]+/?$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /app-shell.html =404;
    }

    location ~ ^/invite/[^/]+/guests/?$ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files /app-shell.html =404;
    }

    location ~ ^/invite/[^/]+/?$ {
        add_header X-Robots-Tag "noindex, follow" always;
        try_files /app-shell.html =404;
    }

    location = /app-shell.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # Public marketing routes are prerendered/static. Unknown URLs return a real 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # API Proxy
    location /api {
        proxy_pass http://backend:9191;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads Proxy
    location /uploads {
        proxy_pass http://backend:9191;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Static Assets Caching (Vite hashed files)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Other static files
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|mp4|webm|wav|mp3|m4a|aac|oga)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000, plus";
        access_log off;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
