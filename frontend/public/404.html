<!doctype html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Toiga Shaqyru</title>
    <meta name="robots" content="noindex,follow">
    <style>
        :root {
            --bg: #f8fffe;
            --text: #064e3b;
            --muted: #64748b;
            --accent: #10b981;
            --surface: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: radial-gradient(circle at top, #ecfdf5, transparent 45%), var(--bg);
            color: var(--text);
            font-family: Manrope, system-ui, sans-serif;
        }

        main {
            width: min(100%, 44rem);
            padding: 3rem 2rem;
            border-radius: 2rem;
            background: var(--surface);
            border: 1px solid rgba(16, 185, 129, 0.14);
            box-shadow: 0 24px 64px rgba(6, 78, 59, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 1rem;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.15;
            font-family: Unbounded, Manrope, sans-serif;
        }

        p {
            margin: 0 auto 1rem;
            max-width: 34rem;
            line-height: 1.7;
            color: var(--muted);
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 0.85rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 1.25rem;
            border-radius: 999px;
            background: #ecfdf5;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <div style="font-size: 4rem; margin-bottom: 1rem;">404</div>
        <h1>Бет табылмады / Страница не найдена</h1>
        <p>Сұралған бет табылмады. Мүмкін URL қате, ескірген немесе енді жоқ.</p>
        <p>Запрошенная страница не найдена. Возможно, URL неверный, устаревший или больше не существует.</p>
        <div class="links">
            <a href="/kk/">Қазақша</a>
            <a href="/ru/">Русский</a>
        </div>
    </main>
</body>
</html>
