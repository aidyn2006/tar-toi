server:
  port: 9191

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/toi_db_fresh}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:toi_user}
    password: ${DB_PASSWORD:toi_pass}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000
  refresh-expiration: 604800000

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:${jwt.secret}}
      expiration: ${JWT_EXPIRATION_MS:${jwt.expiration}}
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION_MS:${jwt.refresh-expiration}}

uploads:
  dir: ${UPLOAD_DIR:uploads}
  public-url: ${UPLOAD_PUBLIC_URL:http://localhost:9191}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: ${MINIO_BUCKET:uploads}
  public-url: ${MINIO_PUBLIC_URL:}
  presign-expiration-seconds: ${MINIO_PRESIGN_EXPIRATION_SECONDS:86400}
