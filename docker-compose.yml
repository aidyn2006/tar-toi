services:
  db:
    image: postgres:16-alpine
    container_name: toi-db-fresh
    environment:
      POSTGRES_DB: toi_db_fresh
      POSTGRES_USER: toi_user
      POSTGRES_PASSWORD: toi_pass
    ports:
      - "5435:5432"
    volumes:
      - toi_pg_data_fresh:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U toi_user -d toi_db_fresh" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./toi
    container_name: toi-backend
    ports:
      - "9191:9191"
    volumes:
      - ./uploads:/app/uploads
    environment:
      JWT_SECRET: "replace-with-very-strong-secret-key-at-least-32-char"
      JWT_EXPIRATION_MINUTES: "120"
      JWT_ISSUER: "toi-api"
      DEFAULT_ADMIN_PHONE: "77000000000"
      DEFAULT_ADMIN_FULL_NAME: "TOI Administrator"
      DEFAULT_ADMIN_PASSWORD: "admin123"
      DB_URL: "jdbc:postgresql://db:5432/toi_db_fresh"
      DB_USERNAME: "toi_user"
      DB_PASSWORD: "toi_pass"
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin123}"
      MINIO_BUCKET: "${MINIO_BUCKET:-uploads}"
      MINIO_PUBLIC_URL: "http://localhost:9000/${MINIO_BUCKET:-uploads}"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-12-29T10-37-34Z
    container_name: toi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - toi_minio_data:/data
    restart: unless-stopped

  minio-setup:
    image: minio/mc:RELEASE.2024-12-29T10-37-34Z
    container_name: toi-minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      set -e; \
      until mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD; do sleep 2; done; \
      mc mb --ignore-existing myminio/${MINIO_BUCKET:-uploads}; \
      mc anonymous set download myminio/${MINIO_BUCKET:-uploads}; \
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
    restart: "no"

  frontend:
    build:
      context: ./frontend
    container_name: toi-frontend
    ports:
      - "7171:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  toi_pg_data_fresh:
  toi_frontend_node_modules:
  toi_minio_data:
